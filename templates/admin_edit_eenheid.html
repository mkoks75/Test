{% extends "base.html" %}
{% block title %}Eenheid bewerken - MountainSense Farm{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-inner">
    <h1>Eenheid bewerken</h1>
    <p><a href="/admin">Beheer</a> &rsaquo; Eenheid bewerken</p>
  </div>
</div>

<main>
  <div class="kaart" style="max-width:480px;">
    <form method="post" action="/admin/eenheid/{{ eenheid.id }}/edit">
      <div class="veld">
        <label for="naam">Naam</label>
        <input type="text" id="naam" name="naam" value="{{ eenheid.naam }}" required>
      </div>
      <div class="veld">
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; padding-top:6px;">
          <input type="checkbox" name="etiket_per_stuk" value="1" style="width:18px; height:18px;"
            {% if eenheid.etiket_per_stuk %}checked{% endif %}>
          Etiket per stuk
        </label>
      </div>
      <div style="display:flex; gap:10px; margin-top:16px;">
        <button type="submit" class="btn btn-primair">Opslaan</button>
        <a href="/admin" class="btn btn-secundair">Annuleren</a>
      </div>
    </form>
  </div>
</main>
{% endblock %}
