<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen - MountainSense Farm</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-wrapper">
  <div class="login-kaart">
    <div class="login-logo">&#127807;</div>
    <h1>MountainSense Farm</h1>
    <p class="login-subtitel">Log in om verder te gaan</p>

    {% if error %}
    <div class="melding melding-fout">{{ error }}</div>
    {% endif %}

    {% if request.query_params.get('success') == 'wachtwoord_gereset' %}
    <div class="melding melding-succes">Je wachtwoord is succesvol gewijzigd. Je kunt nu inloggen.</div>
    {% endif %}

    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next if next is defined else '/' }}">
      <div class="form-group">
        <label for="username">Gebruikersnaam</label>
        <input type="text" id="username" name="username" required autofocus placeholder="boer1">
      </div>
      <div class="form-group">
        <label for="password">Wachtwoord</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primair">Inloggen</button>
    </form>
    <p style="margin-top:16px; text-align:center; font-size:.88rem;">
      <a href="/wachtwoord-vergeten" style="color:var(--groen);">Wachtwoord vergeten?</a>
    </p>
  </div>
</div>
</body>
</html>
