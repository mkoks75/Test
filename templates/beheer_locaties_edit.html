{% extends "base.html" %}
{% block title %}Locatie bewerken - MountainSense Farm{% endblock %}

{% block content %}
<div class="page-header">
  <div class="page-header-inner">
    <h1>Locatie bewerken</h1>
    <p><a href="/beheer/locaties">Locaties</a> &rsaquo; {{ location.name }}</p>
  </div>
</div>

<main>
  <div class="kaart form-container">
    <form method="post" action="/beheer/locaties/edit/{{ location.id }}">
      <div class="form-group">
        <label for="name">Naam <span style="color:var(--rood)">*</span></label>
        <input type="text" id="name" name="name" value="{{ location.name }}" required>
      </div>
      <div style="display:flex; gap:10px; margin-top:8px;">
        <button type="submit" class="btn btn-primair">Opslaan</button>
        <a href="/beheer/locaties" class="btn btn-secundair">Annuleren</a>
      </div>
    </form>

    <hr style="margin:24px 0; border:none; border-top:1px solid #e9ecef;">

    <form method="post" action="/beheer/locaties/delete/{{ location.id }}"
          onsubmit="return confirm('Weet je zeker dat je locatie \'{{ location.name }}\' wilt verwijderen?')">
      <button type="submit" class="btn btn-gevaar">Verwijderen</button>
    </form>
  </div>
</main>
{% endblock %}
